version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: scanner-postgres
    environment:
      POSTGRES_USER: scanner_user
      POSTGRES_PASSWORD: scanner_pass_2024
      POSTGRES_DB: scanner_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scanner-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: scanner-redis
    ports:
      - "6379:6379"
    networks:
      - scanner-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scanner-backend
    environment:
      - DATABASE_URL=postgresql://scanner_user:scanner_pass_2024@postgres:5432/scanner_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=my-super-secret-key-change-this-in-production-32chars
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - scanner-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  scanner-network:
    driver: bridge